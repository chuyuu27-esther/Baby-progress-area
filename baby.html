<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今天也要一起進步 🌸</title>
    <style>
        :root {
            --bg-color: #fdfcf5; --primary-pink: #ffb7c5; --deep-pink: #e08e9b;
            --accent-pink: #ffebee; --stamp-color: #ff6b81; --text-color: #5d4037;
            --tomorrow-bg: #f5fff5; --tomorrow-border: #e2f3e2; 
            --wish-yellow: #fff9e6; --wish-gold: #ffd700;
            --shadow: 0 10px 25px rgba(224, 142, 155, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh;
        }
        h2 { color: var(--deep-pink); font-weight: 600; margin-bottom: 5px; }
        .subtitle { font-size: 0.85rem; color: #a08080; margin-bottom: 20px; }
        .container {
            width: 100%; max-width: 420px; background: white;
            padding: 25px; border-radius: 30px;
            box-shadow: var(--shadow); border: 2px solid var(--accent-pink);
        }
        
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--accent-pink); border-radius: 12px; font-size: 1rem; }
        .wish-input { background-color: var(--wish-yellow) !important; border: 2px dashed #ffe082 !important; color: #b8860b !important; }

        .main-btn { width: 100%; background: var(--primary-pink); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .edit-btn { background: none; border: 1px solid var(--primary-pink); color: var(--primary-pink); padding: 5px 12px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; align-self: center; }
        .role-btn { flex: 1; border: none; padding: 12px; border-radius: 50px; cursor: pointer; color: var(--deep-pink); background: transparent; font-weight: bold; transition: 0.3s; }
        .role-btn.active { background: var(--primary-pink); color: white; }

        .wish-box { background: var(--wish-yellow); border: 2px dashed var(--bg-color); border-radius: 15px; padding: 10px; margin: 10px 0; font-size: 0.9rem; color: #b8860b; text-align: center; }

        .goal-card { position: relative; border: 2px solid var(--accent-pink); border-radius: 20px; padding: 15px; background: #fffafb; margin-bottom: 20px; display: flex; flex-direction: column; }
        .goal-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--accent-pink); }
        
        input[type="checkbox"] { appearance: none; width: 22px; height: 22px; border: 2px solid var(--primary-pink); border-radius: 6px; position: relative; cursor: pointer; }
        input[type="checkbox"]:checked { background-color: var(--primary-pink); }
        input[type="checkbox"]:checked::after { content: '❤'; position: absolute; color: white; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        .stamp {
            position: absolute; right: 5px; top: 5px; width: 70px; height: 70px;
            border: 3px double var(--stamp-color); color: var(--stamp-color); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.8); transform: rotate(15deg); font-weight: bold; font-size: 0.8rem;
        }
        
        .section-title { font-size: 1.1rem; color: var(--deep-pink); margin: 25px 0 10px 0; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .tomorrow-board { width: 100%; border-radius: 15px; padding: 15px; border: 2px solid var(--tomorrow-border); background: var(--tomorrow-bg); }
        
        .message-list { max-height: 200px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; padding: 5px; }
        .msg-bubble { padding: 8px 12px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
        .msg-left { align-self: flex-start; background: white; border: 1px solid var(--accent-pink); }
        .msg-right { align-self: flex-end; background: var(--primary-pink); color: white; }

        /* 足跡與統計相關 CSS */
        .history-day-group { margin-bottom: 15px; border-radius: 15px; overflow: hidden; border: 1px solid var(--accent-pink); }
        .history-bg-white { background: white; }
        .history-bg-pink { background: var(--accent-pink); }
        .history-item { display: flex; align-items: center; gap: 12px; padding: 15px; position: relative; border-bottom: 1px dashed rgba(224, 142, 155, 0.3); font-size: 0.85rem; }
        .history-item:last-child { border-bottom: none; }
        .history-stamp { color: var(--stamp-color); font-size: 2.2rem; flex-shrink: 0; transform: rotate(-10deg); user-select: none; width: 40px; text-align: center; }
        .history-content { flex: 1; line-height: 1.5; }
        .del-btn { position: absolute; right: 10px; top: 10px; background: none; border: none; color: #bbb; cursor: pointer; font-size: 1rem; }

        #celebration-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body>

<div id="celebration-overlay">
    <div style="font-size: 80px;">💮</div>
    <h1 style="color: var(--stamp-color);">世界最厲害的寶寶！</h1>
    <p style="font-size: 1.2rem;">你做到了！<br>送你一個大大的ㄇㄨㄚˋ ❤</p>
    <button class="main-btn" style="width:150px; margin-top:20px;" onclick="closeCelebration()">收下獎勵！</button>
</div>

<script>
    const passwords = {
        "0926": "小寶",   
        "2022": "大寶"    
    };

    window.loginRole = null;
    while (!window.loginRole) {
        let pwd = prompt("請輸入你的專屬秘密代號 🤫");
        if (passwords[pwd]) {
            window.loginRole = passwords[pwd];
            alert(`歡迎回來，${window.loginRole}！🌸`);
        } else {
            alert("密碼不對喔！是不是走錯房間了？🐶🐰");
        }
    }
</script>

<h2>今天也要一起進步 🌸</h2>
<div class="subtitle">小寶 🐶 & 大寶 🐰 的秘密基地</div>

<div class="container">
    <div id="my-section"></div>
    <hr style="border: 0; border-top: 1px solid var(--accent-pink); margin: 25px 0;">
    <div id="partner-section"></div>
</div>

<div class="section-title">💬 暖呼呼小語</div>
<div class="container" style="padding:15px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="message-list" class="message-list"></div>
    <div style="display:flex; gap:8px;">
        <input type="text" id="msg-input" placeholder="說點什麼⋯⋯">
        <button class="role-btn active" style="width:50px; flex:none; border-radius:15px;" onclick="sendMessage()">❤</button>
    </div>
</div>

<div class="section-title">📅 預約明天的進步</div>
<div class="container" style="padding:25px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="tomorrow-area"></div>
</div>

<div class="section-title">🏆 我是最棒的</div>
<div class="container" style="padding:20px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="stats-area"></div>
</div>

<div class="history-section" style="width: 100%; max-width: 420px;">
    <div class="section-title">📜 成長足跡</div>
    <div id="history-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove, serverTimestamp, update, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD_SlAnOPvjuiq69qeDoRiqGp3_yu7nsiA",
        authDomain: "baby-progress-area.firebaseapp.com",
        databaseURL: "https://baby-progress-area-default-rtdb.firebaseio.com/", 
        projectId: "baby-progress-area",
        appId: "1:837749770988:web:d61de4c2e83494f71173c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'coupleDataV8');

    let currentUser = window.loginRole; 
    let globalData = { active: {}, tomorrow: {}, messages: {}, history: {} };
    const userMap = { '小寶': { partner: '大寶' }, '大寶': { partner: '小寶' } };
    
    let isEditingToday = false;
    let isEditingTomorrow = false;
    window.showAllHistory = false; // 控制足跡顯示長度

    function getLogicDate() {
        const now = new Date();
        now.setHours(now.getHours() - 4); 
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        return `${year}-${month}-${day}`;
    }

    function getDisplayDate(logicDate) {
        const [y, m, d] = logicDate.split('-');
        return `${parseInt(m)}月${parseInt(d)}日`;
    }

    onValue(dbRef, (snapshot) => {
        const d = snapshot.val() || {};
        const logicToday = getLogicDate();
        
        if (d.active?.[currentUser]?.status === 'completed') {
            document.getElementById('celebration-overlay').style.display = 'flex';
        }

        let rawActive = d.active || {};
        let rawTomorrow = d.tomorrow || {};
        let rawMessages = d.messages || {};
        let needsUpdate = false;
        let updateData = {};

        ['小寶', '大寶'].forEach(u => {
            const activeIsOld = rawActive[u] && rawActive[u].logicDate !== logicToday;
            const tomorrowIsOld = rawTomorrow[u] && rawTomorrow[u].createDate && rawTomorrow[u].createDate !== logicToday;

            if (activeIsOld || tomorrowIsOld) {
                if (rawActive[u] && rawActive[u].status !== 'completed') {
                    const newHistKey = push(child(ref(db), 'coupleDataV8/history')).key;
                    updateData[`history/${newHistKey}`] = { ...rawActive[u], timestamp: serverTimestamp() };
                }
                
                if (rawTomorrow[u]) {
                    updateData[`active/${u}`] = { ...rawTomorrow[u], logicDate: logicToday, date: getDisplayDate(logicToday), status: 'pending' };
                    delete updateData[`active/${u}`].createDate; 
                    updateData[`tomorrow/${u}`] = null;
                } else {
                    updateData[`active/${u}`] = null;
                }
                needsUpdate = true;
            }
        });

        Object.keys(rawMessages).forEach(k => {
            if (rawMessages[k].logicDate !== logicToday) {
                updateData[`messages/${k}`] = null;
                needsUpdate = true;
            }
        });

        if (needsUpdate) {
            update(dbRef, updateData);
            return; 
        }

        globalData = { active: rawActive, tomorrow: rawTomorrow, messages: rawMessages, history: d.history || {} };
        render();
    });

    window.closeCelebration = () => {
        document.getElementById('celebration-overlay').style.display = 'none';
        set(ref(db, `coupleDataV8/active/${currentUser}`), null);
    };

    window.submitGoals = () => {
        const goals = [document.getElementById('g1').value, document.getElementById('g2').value, document.getElementById('g3').value].filter(g => g?.trim());
        const wish = document.getElementById('g-wish').value;
        if(goals.length === 0) return alert("要寫目標喔！");
        
        isEditingToday = false;
        const logicToday = getLogicDate();
        set(ref(db, `coupleDataV8/active/${currentUser}`), {
            owner: currentUser, logicDate: logicToday, date: getDisplayDate(logicToday),
            status: 'pending', items: goals.map(g => ({t: g, d: false})), wish: wish
        });
    };

    window.saveTomorrowPlan = () => {
        const goals = [document.getElementById('t1').value, document.getElementById('t2').value, document.getElementById('t3').value].filter(g => g?.trim());
        const wish = document.getElementById('t-wish').value;
        if(goals.length === 0) return alert("明天也要有計畫喔！");
        
        isEditingTomorrow = false;
        set(ref(db, `coupleDataV8/tomorrow/${currentUser}`), {
            owner: currentUser, items: goals.map(g => ({t: g, d: false})), wish: wish, createDate: getLogicDate()
        });
    };

    window.modifyTodayGoal = () => { isEditingToday = true; render(); };
    window.cancelEditToday = () => { isEditingToday = false; render(); };
    
    window.editTomorrow = () => { isEditingTomorrow = true; render(); };
    window.cancelEditTomorrow = () => { isEditingTomorrow = false; render(); };
    window.toggleHistory = () => { window.showAllHistory = !window.showAllHistory; render(); };

    window.toggleCheck = (idx) => {
        const target = globalData.active[currentUser];
        if(!target) return;
        target.items[idx].d = !target.items[idx].d;
        set(ref(db, `coupleDataV8/active/${currentUser}`), target);
    };

    window.requestReview = () => {
        if (!globalData.active[currentUser].items.every(i => i.d)) return alert("全部打勾勾才能請寶寶蓋章喔！💪");
        globalData.active[currentUser].status = 'reviewing';
        set(ref(db, `coupleDataV8/active/${currentUser}`), globalData.active[currentUser]);
    };

    window.approvePartner = () => {
        const partner = userMap[currentUser].partner;
        const partnerData = globalData.active[partner];
        if(!partnerData) return;
        partnerData.status = 'completed'; 
        
        const finished = { ...partnerData, timestamp: serverTimestamp() };
        delete finished.wish;
        push(ref(db, 'coupleDataV8/history'), finished);
        set(ref(db, `coupleDataV8/active/${partner}`), partnerData);
    };

    window.sendMessage = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        push(ref(db, 'coupleDataV8/messages'), {
            sender: currentUser, text: input.value, time: new Date().getHours() + ":" + new Date().getMinutes().toString().padStart(2, '0'), 
            date: getDisplayDate(getLogicDate()), 
            logicDate: getLogicDate(), 
            timestamp: serverTimestamp()
        });
        input.value = '';
    };

    window.deleteHistory = (key) => { if(confirm("要刪除這段足跡嗎？")) remove(ref(db, `coupleDataV8/history/${key}`)); };

    function render() {
        const myActive = globalData.active[currentUser];
        const partner = userMap[currentUser].partner;
        const pActive = globalData.active[partner];
        const tmPlan = globalData.tomorrow[currentUser];

        const myS = document.getElementById('my-section');
        if (!myActive || isEditingToday) {
            myS.innerHTML = `<div class="input-group">
                <h3>✍ ${isEditingToday ? '修改' : '設定'}今日目標 (${getDisplayDate(getLogicDate())})</h3>
                <input type="text" id="g1" placeholder="目標 1">
                <input type="text" id="g2" placeholder="目標 2">
                <input type="text" id="g3" placeholder="目標 3">
                <input type="text" id="g-wish" class="wish-input" placeholder="🎁 完成獎勵小許願">
                <button class="main-btn" onclick="submitGoals()">${isEditingToday ? '儲存修改 ✨' : '開始努力！ ✨'}</button>
                ${isEditingToday ? `<button class="edit-btn" style="color:#999; border-color:#ccc; margin-top:10px; width:100%;" onclick="cancelEditToday()">取消修改</button>` : ''}
            </div>`;
            if (isEditingToday && myActive) {
                setTimeout(() => {
                    myActive.items.forEach((it, i) => { if(document.getElementById('g'+(i+1))) document.getElementById('g'+(i+1)).value = it.t; });
                    if(document.getElementById('g-wish')) document.getElementById('g-wish').value = myActive.wish || "";
                }, 0);
            }
        } else {
            myS.innerHTML = `<div class="goal-card">${myActive.status === 'completed' ? '<div class="stamp">💮<span>棒棒</span></div>' : ''}<h4>我的任務 (${myActive.date})</h4>${myActive.wish ? `<div class="wish-box">✨ 達成獎勵：${myActive.wish}</div>` : ''}${myActive.items.map((it, i) => `<div class="goal-item"><input type="checkbox" ${it.d ? 'checked' : ''} ${myActive.status!=='pending' ? 'disabled' : ''} onclick="toggleCheck(${i})"><span>${it.t}</span></div>`).join('')}<div style="margin-top:10px; display:flex; flex-direction:column; gap:5px;">${myActive.status === 'pending' ? '<button class="main-btn" onclick="requestReview()">完成！請寶寶蓋章</button>' : (myActive.status === 'reviewing' ? '<p class="status-msg">⏳ 等待寶寶蓋章中...</p>' : '<p class="status-msg" style="color:#4caf50; font-weight:bold;">🎉 任務已達成！</p>')}<button class="edit-btn" onclick="modifyTodayGoal()">修改/增加任務</button></div></div>`;
        }

        const pS = document.getElementById('partner-section');
        if (!pActive) {
            pS.innerHTML = `<p class="status-msg">🍵 ${partner} 還在準備中⋯⋯</p>`;
        } else {
            pS.innerHTML = `<div class="goal-card">${pActive.status === 'completed' ? '<div class="stamp">💮<span>棒棒</span></div>' : ''}<h4>${partner} 的任務</h4>${pActive.wish ? `<div class="wish-box">🎁 我的寶寶的願望：${pActive.wish}</div>` : ''}${pActive.items.map(it => `<div class="goal-item"><input type="checkbox" ${it.d ? 'checked' : ''} disabled><span>${it.t}</span></div>`).join('')}${pActive.status === 'completed' ? '<p class="status-msg" style="color:#4caf50; font-weight:bold; font-size:1.1rem;">✨ 完成啦！💮 ✨</p>' : (pActive.status === 'reviewing' ? `<button class="main-btn" style="background:#ff6b81" onclick="approvePartner()">💮 幫 ${partner} 蓋章</button>` : `<p class="status-msg">加油中！期待你的願望 🍭</p>`)}</div>`;
        }

        const tmArea = document.getElementById('tomorrow-area');
        if (!tmPlan || isEditingTomorrow) {
            tmArea.innerHTML = `<div class="tomorrow-board" style="margin:0;">
                <h4 style="margin-top:0;">${isEditingTomorrow ? '✍ 修改明日計畫' : '提前規劃明天'}</h4>
                <input type="text" id="t1" placeholder="明日計畫 1">
                <input type="text" id="t2" placeholder="明日計畫 2">
                <input type="text" id="t3" placeholder="明日計畫 3">
                <input type="text" id="t-wish" class="wish-input" placeholder="🎁 明日的獎勵小許願">
                <button class="main-btn" style="background:#a5d6a7" onclick="saveTomorrowPlan()">${isEditingTomorrow ? '儲存修改 ✨' : '儲存明日計畫 ✨'}</button>
                ${isEditingTomorrow ? `<button class="edit-btn" style="color:#999; border-color:#ccc; margin-top:10px; width:100%;" onclick="cancelEditTomorrow()">取消修改</button>` : ''}
            </div>`;
            if (isEditingTomorrow && tmPlan) {
                setTimeout(() => {
                    tmPlan.items.forEach((it, i) => { if(document.getElementById('t'+(i+1))) document.getElementById('t'+(i+1)).value = it.t; });
                    if(document.getElementById('t-wish')) document.getElementById('t-wish').value = tmPlan.wish || "";
                }, 0);
            }
        } else {
            tmArea.innerHTML = `<div class="tomorrow-board" style="text-align:center; margin:0;"><p style="color:#4caf50; font-weight:bold; margin-top:0;">明日計畫與願望已備妥 🚀</p><button class="edit-btn" style="border-color:#a5d6a7; color:#4caf50; margin:0;" onclick="editTomorrow()">修改明日計畫</button></div>`;
        }

        const msgList = document.getElementById('message-list');
        const msgs = Object.values(globalData.messages || {}).sort((a,b) => a.timestamp - b.timestamp);
        msgList.innerHTML = msgs.length > 0 ? msgs.map(m => `<div class="msg-bubble ${m.sender === currentUser ? 'msg-right' : 'msg-left'}"><small style="font-size:0.6rem; opacity:0.7;">${m.time}</small><br>${m.text}</div>`).join('') : '<p style="text-align:center;color:#ccc;font-size:0.8rem;">還沒有留言...</p>';
        msgList.scrollTop = msgList.scrollHeight;

        // --- 月曆與統計計算 ---
        const logicToday = getLogicDate();
        const [currY, currM] = logicToday.split('-');
        let myStamps = 0, partnerStamps = 0;
        const myStampedDates = new Set();
        
        Object.values(globalData.history || {}).forEach(h => {
            if(h.status === 'completed' && h.logicDate && h.logicDate.startsWith(`${currY}-${currM}`)) {
                if(h.owner === currentUser) { myStamps++; myStampedDates.add(h.logicDate); }
                if(h.owner === partner) partnerStamps++;
            }
        });
        
        let leadText = myStamps > partnerStamps ? `👑 目前我領先！` : (myStamps < partnerStamps ? `🔥 ${partner} 領先中，我要加速了！` : `🤝 我們一樣厲害！`);
        let statsHtml = `<p style="text-align:center; font-weight:bold; color:var(--deep-pink); margin:0 0 10px 0;">本月戰況 (${currM}月) <br> <span style="font-size:0.9rem; color:#888;">我 ${myStamps} 個章 vs ${partner} ${partnerStamps} 個章</span><br><span style="font-size:0.8rem; color:#ffb7c5;">${leadText}</span></p>`;
        
        statsHtml += `<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:5px; text-align:center; font-size:0.8rem; margin-top:15px;">`;
        ['日','一','二','三','四','五','六'].forEach(d => statsHtml += `<div style="font-weight:bold; color:#a08080;">${d}</div>`);
        
        const firstDayOfWeek = new Date(parseInt(currY), parseInt(currM)-1, 1).getDay();
        const daysInMonth = new Date(parseInt(currY), parseInt(currM), 0).getDate();
        
        for(let i=0; i<firstDayOfWeek; i++) statsHtml += `<div></div>`;
        for(let d=1; d<=daysInMonth; d++) {
            const dayStr = `${currY}-${currM}-${String(d).padStart(2,'0')}`;
            const hasStamp = myStampedDates.has(dayStr);
            statsHtml += `<div style="padding:6px 0; border-radius:8px; background:${hasStamp?'var(--accent-pink)':'#f9f9f9'}; position:relative; overflow:hidden;">
                <span style="position:relative; z-index:2; ${hasStamp?'font-weight:bold; color:var(--deep-pink);':''}">${d}</span>
                ${hasStamp ? '<div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:1.8rem; opacity:0.4; z-index:1; user-select:none;">💮</div>' : ''}
            </div>`;
        }
        statsHtml += `</div>`;
        document.getElementById('stats-area').innerHTML = statsHtml;

        // --- 成長足跡分組與交替顯示 ---
        const histRaw = Object.entries(globalData.history || {}).sort(([,a], [,b]) => (b.timestamp||0) - (a.timestamp||0));
        const groupedDates = [];
        histRaw.forEach(([key, h]) => {
            const dKey = h.logicDate || h.date;
            let group = groupedDates.find(g => g.dateKey === dKey);
            if(!group) { group = { dateKey: dKey, items: [] }; groupedDates.push(group); }
            group.items.push({ key, ...h });
        });
        
        // 確保依照日期近到遠排序
        groupedDates.sort((a,b) => b.dateKey.localeCompare(a.dateKey));
        
        const displayGroups = window.showAllHistory ? groupedDates : groupedDates.slice(0, 7);
        let histHtml = displayGroups.map((group, gIdx) => {
            const bgClass = gIdx % 2 === 0 ? 'history-bg-white' : 'history-bg-pink';
            return `<div class="history-day-group ${bgClass}">
                ${group.items.map(h => `
                <div class="history-item">
                    <button class="del-btn" onclick="deleteHistory('${h.key}')">🗑️</button>
                    <div class="history-stamp">${h.status === 'completed' ? '💮' : '<span style="opacity:0.2;">⭕</span>'}</div>
                    <div class="history-content">
                        <small style="color:#888; font-weight:bold;">${h.date} · ${h.owner}</small><br>
                        ${h.items.map(i => (i.d ? '✅' : '❌') + i.t).join('<br>')}
                    </div>
                </div>`).join('')}
            </div>`;
        }).join('');

        if (groupedDates.length > 7) {
            histHtml += `<button class="edit-btn" style="width:100%; margin-top:10px; background:white;" onclick="toggleHistory()">${window.showAllHistory ? '收合紀錄 🔼' : '瀏覽全部記錄 🔽'}</button>`;
        } else if (groupedDates.length === 0) {
            histHtml += `<p style="text-align:center; color:#ccc; font-size:0.9rem;">目前還沒有紀錄喔 🌱</p>`;
        }
        document.getElementById('history-list').innerHTML = histHtml;
    }
</script>
</body>
</html>
