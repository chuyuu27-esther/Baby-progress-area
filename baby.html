<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今天也要一起進步 🌸</title>
    <style>
        :root {
            --bg-color: #fdfcf5; --primary-pink: #ffb7c5; --deep-pink: #e08e9b;
            --accent-pink: #ffebee; --stamp-color: #ff6b81; --text-color: #5d4037;
            --tomorrow-bg: #f5fff5; --tomorrow-border: #e2f3e2; 
            --wish-yellow: #fff9e6; --wish-gold: #ffd700;
            --shadow: 0 10px 25px rgba(224, 142, 155, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh;
        }
        h2 { color: var(--deep-pink); font-weight: 600; margin-bottom: 5px; }
        .subtitle { font-size: 0.85rem; color: #a08080; margin-bottom: 20px; }
        .container {
            width: 100%; max-width: 420px; background: white;
            padding: 25px; border-radius: 30px;
            box-shadow: var(--shadow); border: 2px solid var(--accent-pink);
            margin-bottom: 20px;
        }
        
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--accent-pink); border-radius: 12px; font-size: 1rem; }
        .wish-input { background-color: var(--wish-yellow) !important; border: 2px dashed #ffe082 !important; color: #b8860b !important; }

        .wish-box {
            background-color: var(--wish-yellow);
            border: 1px dashed #ffe082;
            color: #b8860b;
            padding: 10px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            font-weight: normal; 
        }

        .main-btn { width: 100%; background: var(--primary-pink); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .edit-btn { background: none; border: 1px solid var(--primary-pink); color: var(--primary-pink); padding: 5px 12px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; align-self: center; }
        
        .goal-card { position: relative; border: 2px solid var(--accent-pink); border-radius: 20px; padding: 15px; background: #fffafb; margin-bottom: 20px; display: flex; flex-direction: column; }
        .goal-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--accent-pink); }
        
        input[type="checkbox"] { appearance: none; width: 22px; height: 22px; border: 2px solid var(--primary-pink); border-radius: 6px; position: relative; cursor: pointer; }
        input[type="checkbox"]:checked { background-color: var(--primary-pink); }
        input[type="checkbox"]:checked::after { content: '❤'; position: absolute; color: white; font-size: 14px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        
        .stamp {
            position: absolute; right: 5px; top: 5px; width: 70px; height: 70px;
            border: 3px double var(--stamp-color); color: var(--stamp-color); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.8); transform: rotate(15deg); font-weight: bold; font-size: 0.8rem;
            z-index: 10;
        }
        
        .section-title { font-size: 1.1rem; color: var(--deep-pink); margin: 25px 0 10px 0; display: flex; align-items: center; gap: 8px; font-weight: bold; width: 100%; max-width: 420px; }
        .tomorrow-board { width: 100%; border-radius: 15px; padding: 15px; border: 2px solid var(--tomorrow-border); background: var(--tomorrow-bg); }
        
        .message-list { max-height: 200px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; padding: 5px; }
        .msg-bubble { padding: 8px 12px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
        .msg-left { align-self: flex-start; background: white; border: 1px solid var(--accent-pink); }
        .msg-right { align-self: flex-end; background: var(--primary-pink); color: white; }

        .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; text-align: center; font-size: 0.8rem; margin-top: 10px; }
        .cal-day { padding: 8px 0; border-radius: 8px; background: #f9f9f9; position: relative; min-height: 45px; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: pointer; transition: background 0.2s; overflow: hidden; }
        .cal-day:hover { background: #f0f0f0; }
        .cal-day.active { background: var(--accent-pink); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .nav-btn { background: none; border: 1px solid var(--primary-pink); color: var(--primary-pink); border-radius: 50%; width: 25px; height: 25px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        .history-day-group { margin-bottom: 15px; border-radius: 15px; overflow: hidden; border: 1px solid var(--accent-pink); }
        .history-bg-white { background: white; }
        .history-bg-pink { background: var(--accent-pink); }
        .history-item { display: flex; align-items: center; gap: 12px; padding: 15px; position: relative; font-size: 0.85rem; }
        .history-stamp { color: var(--stamp-color); font-size: 2.2rem; flex-shrink: 0; transform: rotate(-10deg); width: 40px; text-align: center; }
        .history-content { flex: 1; line-height: 1.5; }
        .del-btn { position: absolute; right: 10px; top: 10px; background: none; border: none; color: #bbb; cursor: pointer; font-size: 1rem; }

        #summary-overlay, #celebration-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.98); z-index: 1000;
            display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px;
        }
    </style>
</head>
<body>

<div id="celebration-overlay">
    <div style="font-size: 80px;">💮</div>
    <h1 style="color: var(--stamp-color);">世界最厲害的寶寶！</h1>
    <p style="font-size: 1.2rem;">你做到了！<br>送你一個大大的ㄇㄨㄚˋ ❤</p>
    <button class="main-btn" style="width:150px; margin-top:20px;" onclick="closeCelebration()">收下獎勵！</button>
</div>

<div id="summary-overlay">
    <div style="font-size: 60px;">🏆</div>
    <h2 id="summary-title" style="color: var(--stamp-color);">上月PK結果</h2>
    <div id="summary-content" class="container" style="box-shadow:none; border-style:dashed; margin:20px 0;"></div>
    <button class="main-btn" style="width:180px;" onclick="closeSummary()">收到！新月份加油！✨</button>
</div>

<script>
    const passwords = { "0926": "小寶", "2022": "大寶" };
    window.loginRole = null;
    while (!window.loginRole) {
        let pwd = prompt("請輸入你的專屬秘密代號 🤫");
        if (passwords[pwd]) {
            window.loginRole = passwords[pwd];
            alert(`歡迎回來，${window.loginRole}！🌸`);
        } else {
            alert("再好好想想吧！");
        }
    }
</script>

<h2>今天也要一起進步 🌸</h2>
<div class="subtitle">小寶 🐶 & 大寶 🐰 的秘密基地</div>

<div class="container">
    <div id="my-section"></div>
    <hr style="border: 0; border-top: 1px solid var(--accent-pink); margin: 25px 0;">
    <div id="partner-section"></div>
</div>

<div class="section-title" style="justify-content: center;">🎥 看看我吧</div>
<div class="container" style="padding:15px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="video-calendar-area"></div>
</div>

<div class="section-title" style="justify-content: center;">💬 暖呼呼小語</div>
<div class="container" style="padding:15px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="message-list" class="message-list"></div>
    <div style="display:flex; gap:8px;">
        <input type="text" id="msg-input" placeholder="說點什麼⋯⋯">
        <button class="role-btn" style="width:50px; flex:none; border-radius:15px; background:var(--primary-pink); color:white; border:none;" onclick="sendMessage()">❤</button>
    </div>
</div>

<div class="section-title" style="justify-content: center;">📅 預約明天的進步</div>
<div class="container" style="padding:25px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="tomorrow-area"></div>
</div>

<div class="section-title" style="justify-content: center;">🏆 我是最棒的</div>
<div class="container" style="padding:20px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="stats-area"></div>
</div>

<div class="history-section" style="width: 100%; max-width: 420px;">
    <div class="section-title" style="justify-content: center;">📜 成長足跡</div>
    <div id="history-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove, serverTimestamp, update, child } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD_SlAnOPvjuiq69qeDoRiqGp3_yu7nsiA",
        authDomain: "baby-progress-area.firebaseapp.com",
        databaseURL: "https://baby-progress-area-default-rtdb.firebaseio.com/", 
        projectId: "baby-progress-area",
        appId: "1:837749770988:web:d61de4c2e83494f71173c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'coupleDataV8');

    let currentUser = window.loginRole; 
    let globalData = { active: {}, tomorrow: {}, messages: {}, history: {}, videos: {}, settings: {} };
    const userMap = { '小寶': { partner: '大寶', icon: '🐶' }, '大寶': { partner: '小寶', icon: '🐰' } };
    
    let isEditingToday = false, isEditingTomorrow = false;
    window.showAllHistory = false;

    let statsViewDate = new Date(); 
    let videoViewDate = new Date(); 
    statsViewDate.setHours(0,0,0,0);
    videoViewDate.setHours(0,0,0,0);

    function getLogicDate() {
        const now = new Date();
        now.setHours(now.getHours() - 4); 
        const y = now.getFullYear(), m = String(now.getMonth() + 1).padStart(2, '0'), d = String(now.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function getDisplayDate(logicDate) {
        const [y, m, d] = logicDate.split('-');
        return `${parseInt(m)}月${parseInt(d)}日`;
    }

    onValue(dbRef, (snapshot) => {
        const d = snapshot.val() || {};
        const logicToday = getLogicDate();
        
        if (d.active?.[currentUser]?.status === 'completed') {
            document.getElementById('celebration-overlay').style.display = 'flex';
        }

        let rawActive = d.active || {}, rawTomorrow = d.tomorrow || {}, rawMessages = d.messages || {}, needsUpdate = false, updateData = {};

        ['小寶', '大寶'].forEach(u => {
            if ((rawActive[u] && rawActive[u].logicDate !== logicToday) || (rawTomorrow[u] && rawTomorrow[u].createDate && rawTomorrow[u].createDate !== logicToday)) {
                if (rawActive[u] && rawActive[u].status !== 'completed') {
                    const newKey = push(child(ref(db), 'coupleDataV8/history')).key;
                    updateData[`history/${newKey}`] = { ...rawActive[u], timestamp: serverTimestamp() };
                }
                if (rawTomorrow[u]) {
                    updateData[`active/${u}`] = { ...rawTomorrow[u], logicDate: logicToday, date: getDisplayDate(logicToday), status: 'pending' };
                    delete updateData[`active/${u}`].createDate;
                    updateData[`tomorrow/${u}`] = null;
                } else { updateData[`active/${u}`] = null; }
                needsUpdate = true;
            }
        });

        Object.keys(rawMessages).forEach(k => { if (rawMessages[k].logicDate !== logicToday) { updateData[`messages/${k}`] = null; needsUpdate = true; } });

        if (needsUpdate) { update(dbRef, updateData); return; }

        globalData = { active: rawActive, tomorrow: rawTomorrow, messages: rawMessages, history: d.history || {}, videos: d.videos || {}, settings: d.settings || {} };
        checkSummary(); 
        render();
    });

    function checkSummary() {
        const logicToday = getLogicDate();
        const currentMonthStr = logicToday.substring(0, 7); 
        
        const mySettings = globalData.settings[currentUser] || {};
        const lastSeen = mySettings.lastSummarySeen;
        
        if (lastSeen !== currentMonthStr) {
            let [y, m] = currentMonthStr.split('-').map(Number);
            m -= 1;
            if (m === 0) { m = 12; y -= 1; }
            const targetStr = `${y}-${String(m).padStart(2, '0')}`; 

            let myS = 0, pS = 0, partner = userMap[currentUser].partner;
            Object.values(globalData.history).forEach(h => {
                if (h.status === 'completed' && h.logicDate?.startsWith(targetStr)) {
                    if (h.owner === currentUser) myS++; else pS++;
                }
            });

            if (myS + pS > 0) {
                document.getElementById('summary-content').innerHTML = `
                    <h3 style="margin-top:0;">${m}月份 戰績結算</h3>
                    <div style="font-size:1.1rem; line-height:2;">
                        我的印章：<span style="color:var(--stamp-color); font-weight:bold;">${myS}</span> 個<br>
                        ${partner}的印章：<span style="color:var(--deep-pink); font-weight:bold;">${pS}</span> 個<br>
                        <hr style="border:0; border-top:1px dashed #eee;">
                        ${myS > pS ? '🥇 這回合是我贏了！嘿嘿～' : (myS < pS ? `🥇 ${partner} 寶貝贏了！下個月我會追上！` : '🤝 平手！我們都超級棒！')}
                    </div>`;
                document.getElementById('summary-overlay').style.display = 'flex';
            }
        }
    }

    window.closeSummary = () => {
        const currentMonthStr = getLogicDate().substring(0, 7);
        set(ref(db, `coupleDataV8/settings/${currentUser}/lastSummarySeen`), currentMonthStr);
        document.getElementById('summary-overlay').style.display = 'none';
    };

    window.closeCelebration = () => {
        document.getElementById('celebration-overlay').style.display = 'none';
        set(ref(db, `coupleDataV8/active/${currentUser}`), null);
    };

    // --- 修改：補蓋章加上身分驗證，並且修改提示文字 ---
    window.retroStamp = (key) => {
        const partner = userMap[currentUser].partner;
        if(confirm(`確定要幫 ${partner} 補蓋章嗎？✨\n(系統會自動幫寶貝將未完成的目標打勾喔！)`)) {
            const hData = globalData.history[key];
            if(hData) {
                hData.status = 'completed';
                if(hData.items) hData.items.forEach(i => i.d = true);
                set(ref(db, `coupleDataV8/history/${key}`), hData);
            }
        }
    };

    window.openVideoLink = (dateKey) => {
        const existing = globalData.videos[dateKey]?.[currentUser === '小寶' ? 'dog' : 'rabbit'] || "";
        const msg = existing ? "🎬 修改影片連結：\n(若要刪除，請把輸入框清空後按確定)" : "🎬 貼上今天的影片連結：";
        const url = prompt(msg, existing);
        
        if (url !== null) {
            const field = currentUser === '小寶' ? 'dog' : 'rabbit';
            if (url.trim() === "") {
                set(ref(db, `coupleDataV8/videos/${dateKey}/${field}`), null);
            } else {
                set(ref(db, `coupleDataV8/videos/${dateKey}/${field}`), url.trim());
            }
        }
    };

    window.changeMonth = (type, offset) => {
        if (type === 'stats') { statsViewDate.setMonth(statsViewDate.getMonth() + offset); }
        else { videoViewDate.setMonth(videoViewDate.getMonth() + offset); }
        render();
    };

    window.submitGoals = () => {
        const goals = [document.getElementById('g1').value, document.getElementById('g2').value, document.getElementById('g3').value].filter(g => g?.trim());
        const wish = document.getElementById('g-wish').value;
        if(goals.length === 0) return alert("要寫目標喔！");
        isEditingToday = false;
        set(ref(db, `coupleDataV8/active/${currentUser}`), {
            owner: currentUser, logicDate: getLogicDate(), date: getDisplayDate(getLogicDate()),
            status: 'pending', items: goals.map(g => ({t: g, d: false})), wish: wish
        });
    };

    window.saveTomorrowPlan = () => {
        const goals = [document.getElementById('t1').value, document.getElementById('t2').value, document.getElementById('t3').value].filter(g => g?.trim());
        const wish = document.getElementById('t-wish').value;
        if(goals.length === 0) return alert("明天也要有計畫喔！");
        isEditingTomorrow = false;
        set(ref(db, `coupleDataV8/tomorrow/${currentUser}`), {
            owner: currentUser, items: goals.map(g => ({t: g, d: false})), wish: wish, createDate: getLogicDate()
        });
    };

    window.modifyTodayGoal = () => { isEditingToday = true; render(); };
    window.cancelEditToday = () => { isEditingToday = false; render(); };
    window.editTomorrow = () => { isEditingTomorrow = true; render(); };
    window.cancelEditTomorrow = () => { isEditingTomorrow = false; render(); };
    window.toggleHistory = () => { window.showAllHistory = !window.showAllHistory; render(); };
    window.toggleCheck = (i) => { globalData.active[currentUser].items[i].d = !globalData.active[currentUser].items[i].d; set(ref(db, `coupleDataV8/active/${currentUser}`), globalData.active[currentUser]); };
    window.requestReview = () => {
        if (!globalData.active[currentUser].items.every(i => i.d)) return alert("全部打勾勾才能蓋章喔！");
        globalData.active[currentUser].status = 'reviewing';
        set(ref(db, `coupleDataV8/active/${currentUser}`), globalData.active[currentUser]);
    };
    window.approvePartner = () => {
        const p = userMap[currentUser].partner, pd = globalData.active[p];
        if(!pd) return;
        pd.status = 'completed';
        const finished = { ...pd, timestamp: serverTimestamp() };
        delete finished.wish;
        push(ref(db, 'coupleDataV8/history'), finished);
        set(ref(db, `coupleDataV8/active/${p}`), pd);
    };
    window.sendMessage = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        push(ref(db, 'coupleDataV8/messages'), {
            sender: currentUser, text: input.value, time: new Date().getHours() + ":" + new Date().getMinutes().toString().padStart(2, '0'), 
            logicDate: getLogicDate(), timestamp: serverTimestamp()
        });
        input.value = '';
    };
    window.deleteHistory = (key) => { if(confirm("要刪除嗎？")) remove(ref(db, `coupleDataV8/history/${key}`)); };

    function render() {
        const partner = userMap[currentUser].partner;
        const myActive = globalData.active[currentUser], pActive = globalData.active[partner], tmPlan = globalData.tomorrow[currentUser];
        const currentMonthStr = getLogicDate().substring(0, 7); 

        const myS = document.getElementById('my-section');
        if (!myActive || isEditingToday) {
            myS.innerHTML = `<h3>✍ ${isEditingToday ? '修改' : '設定'}今日目標</h3><input type="text" id="g1" placeholder="目標 1"><input type="text" id="g2" placeholder="目標 2"><input type="text" id="g3" placeholder="目標 3"><input type="text" id="g-wish" class="wish-input" placeholder="🎁 完成獎勵小許願"><button class="main-btn" onclick="submitGoals()">儲存 ✨</button>${isEditingToday ? `<button class="edit-btn" onclick="cancelEditToday()">取消</button>` : ''}`;
            if(isEditingToday && myActive) setTimeout(() => { myActive.items.forEach((it, i) => { if(document.getElementById('g'+(i+1))) document.getElementById('g'+(i+1)).value = it.t; }); document.getElementById('g-wish').value = myActive.wish || ""; }, 0);
        } else {
            myS.innerHTML = `<div class="goal-card">${myActive.status === 'completed' ? '<div class="stamp">💮<span>棒棒</span></div>' : ''}<h4>我的任務 (${myActive.date})</h4>${myActive.wish ? `<div class="wish-box">✨ 獎勵：${myActive.wish}</div>` : ''}${myActive.items.map((it, i) => `<div class="goal-item"><input type="checkbox" ${it.d ? 'checked' : ''} ${myActive.status!=='pending' ? 'disabled' : ''} onclick="toggleCheck(${i})"><span>${it.t}</span></div>`).join('')}<div style="margin-top:10px; display:flex; flex-direction:column; gap:5px;">${myActive.status === 'pending' ? '<button class="main-btn" onclick="requestReview()">完成！請寶寶蓋章</button>' : (myActive.status === 'reviewing' ? '<p class="status-msg">⏳ 等待蓋章中...</p>' : '<p style="color:#4caf50; font-weight:bold;">🎉 任務已達成！</p>')}<button class="edit-btn" onclick="modifyTodayGoal()">修改任務</button></div></div>`;
        }

        const pS = document.getElementById('partner-section');
        if (!pActive) { pS.innerHTML = `<p class="status-msg">🍵 ${partner} 還在準備中⋯⋯</p>`; }
        else { 
            pS.innerHTML = `<div class="goal-card">${pActive.status === 'completed' ? '<div class="stamp">💮<span>棒棒</span></div>' : ''}<h4>${partner}的任務</h4>${pActive.wish ? `<div class="wish-box">🎁 願望：${pActive.wish}</div>` : ''}${pActive.items.map(it => `<div class="goal-item"><input type="checkbox" ${it.d ? 'checked' : ''} disabled><span>${it.t}</span></div>`).join('')}${pActive.status === 'reviewing' ? `<button class="main-btn" style="background:#ff6b81" onclick="approvePartner()">💮 幫 ${partner} 蓋章</button>` : ''}</div>`; 
        }

        const tmArea = document.getElementById('tomorrow-area');
        if (!tmPlan || isEditingTomorrow) {
            tmArea.innerHTML = `<div class="tomorrow-board"><h4>${isEditingTomorrow ? '✍ 修改明日計畫' : '提前規劃明天'}</h4><input type="text" id="t1" placeholder="明日計畫 1"><input type="text" id="t2" placeholder="明日計畫 2"><input type="text" id="t3" placeholder="明日計畫 3"><input type="text" id="t-wish" class="wish-input" placeholder="🎁 明日小許願"><button class="main-btn" style="background:#a5d6a7" onclick="saveTomorrowPlan()">儲存 ✨</button></div>`;
            if(isEditingTomorrow && tmPlan) setTimeout(() => { tmPlan.items.forEach((it, i) => { if(document.getElementById('t'+(i+1))) document.getElementById('t'+(i+1)).value = it.t; }); document.getElementById('t-wish').value = tmPlan.wish || ""; }, 0);
        } else { tmArea.innerHTML = `<div class="tomorrow-board" style="text-align:center;"><p style="color:#4caf50; font-weight:bold;">明日計畫已備妥 🚀</p><button class="edit-btn" style="border-color:#a5d6a7; color:#4caf50;" onclick="editTomorrow()">修改</button></div>`; }

        const msgList = document.getElementById('message-list');
        const msgs = Object.values(globalData.messages || {}).sort((a,b) => a.timestamp - b.timestamp);
        msgList.innerHTML = msgs.length > 0 ? msgs.map(m => `<div class="msg-bubble ${m.sender === currentUser ? 'msg-right' : 'msg-left'}">${m.text}</div>`).join('') : '<p style="text-align:center;color:#ccc;font-size:0.8rem;">還沒有留言...</p>';
        msgList.scrollTop = msgList.scrollHeight;

        renderCalendar('stats', statsViewDate, 'stats-area');
        renderCalendar('video', videoViewDate, 'video-calendar-area');

        // 足跡渲染 (更新補蓋按鈕驗證邏輯)
        const histRaw = Object.entries(globalData.history || {}).sort(([,a], [,b]) => (b.timestamp||0) - (a.timestamp||0));
        const groupedDates = [];
        histRaw.forEach(([key, h]) => {
            const dKey = h.logicDate || h.date;
            let group = groupedDates.find(g => g.dateKey === dKey);
            if(!group) { group = { dateKey: dKey, items: [] }; groupedDates.push(group); }
            group.items.push({ key, ...h });
        });
        const displayGroups = window.showAllHistory ? groupedDates : groupedDates.slice(0, 7);
        
        document.getElementById('history-list').innerHTML = displayGroups.map((group, gIdx) => `
            <div class="history-day-group ${gIdx % 2 === 0 ? 'history-bg-white' : 'history-bg-pink'}">
                <div style="text-align:center; font-weight:bold; color:var(--deep-pink); padding:10px;">✨ ${group.items[0].date} ✨</div>
                ${group.items.map(h => {
                    // 判斷是否符合補蓋資格：未完成、屬於當月、而且「必須是對方的紀錄」
                    const canRetroStamp = h.status !== 'completed' && h.logicDate && h.logicDate.startsWith(currentMonthStr) && h.owner === partner;
                    
                    return `
                    <div class="history-item">
                        <button class="del-btn" onclick="deleteHistory('${h.key}')">🗑️</button>
                        <div class="history-stamp">${h.status === 'completed' ? '💮' : '<div style="width: 20px; height: 20px; border-radius: 50%; background: #e0e0e0; margin: 0 auto;"></div>'}</div>
                        <div class="history-content">
                            <b>${h.owner}</b>
                            ${canRetroStamp ? `<button style="margin-left:8px; padding:2px 8px; background:var(--primary-pink); color:white; border:none; border-radius:10px; font-size:0.75rem; cursor:pointer;" onclick="retroStamp('${h.key}')">幫${partner}補蓋 💮</button>` : ''}
                            <br>${h.items.map(i => (i.d ? '✅' : '❌') + i.t).join(' | ')}
                        </div>
                    </div>`;
                }).join('')}
            </div>`).join('') + (groupedDates.length > 7 ? `<button class="edit-btn" style="width:100%;" onclick="toggleHistory()">${window.showAllHistory ? '收合' : '瀏覽全部'}</button>` : '');
    }

    function renderCalendar(type, viewDate, elementId) {
        const y = viewDate.getFullYear(), m = viewDate.getMonth();
        const monthKey = `${y}-${String(m + 1).padStart(2, '0')}`;
        
        let html = `<div class="cal-header"><button class="nav-btn" onclick="changeMonth('${type}', -1)"><</button><b>${y}年 ${m + 1}月</b><button class="nav-btn" onclick="changeMonth('${type}', 1)">></button></div>`;
        const logicTodayStr = getLogicDate(); 

        if (type === 'stats') {
            let myS = 0, pS = 0, myDates = new Set(), partner = userMap[currentUser].partner;
            Object.values(globalData.history).forEach(h => {
                if (h.status === 'completed' && h.logicDate?.startsWith(monthKey)) {
                    if (h.owner === currentUser) { myS++; myDates.add(h.logicDate); } else pS++;
                }
            });
            
            let leadText = '';
            if (myS > pS) {
                leadText = '🥇 目前是我領先！嘿嘿～';
            } else if (myS < pS) {
                leadText = `🥇 ${partner} 寶貝領先中！我要追上！`;
            } else {
                leadText = '🤝 耶～目前平手！我們都超棒！';
            }

            html += `
                <div style="text-align:center; margin-bottom:10px;">
                    <div style="color:var(--deep-pink); font-weight:bold; font-size:0.95rem;">${leadText}</div>
                    <div style="font-size:0.8rem; color:#888; margin-top:3px;">我 ${myS} 個印章 vs ${partner} ${pS} 個印章</div>
                </div>
            `;
            
            html += `<div class="cal-grid">` + ['日','一','二','三','四','五','六'].map(d => `<b>${d}</b>`).join('');
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) html += `<div></div>`;
            for(let d=1; d<=days; d++) {
                const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const has = myDates.has(dateStr);
                
                html += `<div class="cal-day ${has?'active':''}">
                            <span style="position:relative; z-index:2; ${has ? 'font-weight:bold; color:var(--deep-pink);' : ''}">${d}</span>
                            ${has ? '<div style="font-size:2rem; position:absolute; top:50%; left:50%; transform:translate(-50%, -50%); opacity:0.6; pointer-events:none; z-index:1;">💮</div>' : ''}
                         </div>`;
            }
            html += `</div>`;
        } else {
            html += `<div class="cal-grid">` + ['日','一','二','三','四','五','六'].map(d => `<b>${d}</b>`).join('');
            const first = new Date(y, m, 1).getDay(), days = new Date(y, m + 1, 0).getDate();
            for(let i=0; i<first; i++) html += `<div></div>`;
            for(let d=1; d<=days; d++) {
                const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                const v = globalData.videos[dateStr] || {};
                
                const isFuture = dateStr > logicTodayStr;
                const clickEvent = isFuture ? '' : `onclick="openVideoLink('${dateStr}')"`;
                const styleStr = isFuture ? 'opacity:0.4; cursor:not-allowed; background:transparent;' : '';

                html += `<div class="cal-day" style="${styleStr}" ${clickEvent}>
                    <span style="font-size:0.7rem; color:#ccc;">${d}</span>
                    <div style="display:flex; gap:2px;">
                        ${v.dog ? `<span onclick="event.stopPropagation(); window.open('${v.dog}')" style="cursor:pointer;">🐶</span>` : ''}
                        ${v.rabbit ? `<span onclick="event.stopPropagation(); window.open('${v.rabbit}')" style="cursor:pointer;">🐰</span>` : ''}
                    </div>
                </div>`;
            }
            html += `</div>`;
        }
        document.getElementById(elementId).innerHTML = html;
    }
</script>
</body>
</html>
