<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今天也要一起進步 🌸</title>
    <style>
        :root {
            --bg-color: #fdfcf5; --primary-pink: #ffb7c5; --deep-pink: #e08e9b;
            --accent-pink: #ffebee; --stamp-color: #ff6b81; --text-color: #5d4037;
            --tomorrow-bg: #f0f7f4; --tomorrow-border: #c8e6c9;
            --shadow: 0 10px 25px rgba(224, 142, 155, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh;
        }
        h2 { color: var(--deep-pink); font-weight: 600; margin-bottom: 5px; }
        .subtitle { font-size: 0.85rem; color: #a08080; margin-bottom: 20px; }
        .container {
            width: 100%; max-width: 420px; background: white;
            padding: 25px; border-radius: 30px;
            box-shadow: var(--shadow); border: 2px solid var(--accent-pink);
        }
        .role-switcher { display: flex; gap: 10px; margin-bottom: 20px; background: var(--accent-pink); padding: 5px; border-radius: 50px; }
        .role-btn { flex: 1; border: none; padding: 10px; border-radius: 50px; cursor: pointer; color: var(--deep-pink); background: transparent; font-weight: bold; }
        .role-btn.active { background: var(--primary-pink); color: white; }
        
        .input-group h3 { text-align: center; color: var(--deep-pink); margin-top: 0; font-size: 1.1rem; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--accent-pink); border-radius: 12px; font-size: 1rem; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary-pink); background: #fffafb; }
        .main-btn { width: 100%; background: var(--primary-pink); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .edit-btn { background: none; border: 1px solid var(--primary-pink); color: var(--primary-pink); padding: 5px 12px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; }
        
        .goal-card { position: relative; border: 2px solid var(--accent-pink); border-radius: 20px; padding: 15px; background: #fffafb; margin-bottom: 20px; }
        .goal-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--accent-pink); }
        .goal-item:last-of-type { border-bottom: none; }
        
        input[type="checkbox"] { appearance: none; width: 22px; height: 22px; border: 2px solid var(--primary-pink); border-radius: 6px; position: relative; cursor: pointer; }
        input[type="checkbox"]:checked { background-color: var(--primary-pink); }
        input[type="checkbox"]:checked::after {
            content: '❤'; position: absolute; color: white; font-size: 14px;
            top: 50%; left: 50%; transform: translate(-50%, -50%); line-height: 1;
        }
        
        .stamp {
            position: absolute; right: 0; top: -10px; width: 80px; height: 80px;
            border: 3px double var(--stamp-color); color: var(--stamp-color); border-radius: 50%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.9); transform: rotate(15deg); z-index: 10;
            animation: stampIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes stampIn { 0% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .section-title { font-size: 1.1rem; color: var(--deep-pink); margin: 25px 0 10px 0; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .message-board, .tomorrow-board { width: 100%; max-width: 420px; border-radius: 20px; padding: 15px; border: 1px solid var(--accent-pink); margin-top: 10px; }
        .tomorrow-board { background: var(--tomorrow-bg); border-color: var(--tomorrow-border); }
        .tomorrow-board h4 { margin: 0 0 10px 0; color: #4caf50; font-size: 0.9rem; text-align: center; }

        .message-list { max-height: 200px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 8px 12px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; line-height: 1.4; }
        .msg-left { align-self: flex-start; background: white; border: 1px solid var(--accent-pink); border-bottom-left-radius: 2px; }
        .msg-right { align-self: flex-end; background: var(--primary-pink); color: white; border-bottom-right-radius: 2px; }
        
        .history-item { background: white; padding: 12px; margin-bottom: 10px; border-radius: 15px; border-left: 5px solid var(--primary-pink); font-size: 0.9rem; position: relative; }
        .del-btn { position: absolute; right: 10px; top: 10px; background: none; border: none; color: #ddd; cursor: pointer; }
        .status-msg { text-align: center; color: var(--deep-pink); padding: 10px; font-size: 0.9rem; }
    </style>
</head>
<body>

<script>
    const secret = "0926"; 
    while (prompt("請輸入我們的秘密代號 🤫") !== secret) { alert("代號不對喔！🐶🐰"); }
</script>

<h2>今天也要一起進步 🌸</h2>
<div class="subtitle">小寶 🐶 & 大寶 🐰 的秘密基地</div>

<div class="container">
    <div class="role-switcher">
        <button id="btnA" class="role-btn active" onclick="setRole('小寶')">我是小寶 🐶</button>
        <button id="btnB" class="role-btn" onclick="setRole('大寶')">我是大寶 🐰</button>
    </div>
    <div id="my-section"></div>
    <hr style="border: 0; border-top: 1px solid var(--accent-pink); margin: 25px 0;">
    <div id="partner-section"></div>
</div>

<div class="section-title">💬 給寶寶的暖呼呼小語</div>
<div class="message-board">
    <div id="message-list" class="message-list"></div>
    <div style="display:flex; gap:8px;">
        <input type="text" id="msg-input" placeholder="想對你說...">
        <button class="role-btn active" style="width:50px; flex:none; border-radius:15px;" onclick="sendMessage()">❤</button>
    </div>
</div>

<div class="section-title">📅 預約明天的進步</div>
<div class="tomorrow-board">
    <h4>提前規劃明天要做的事</h4>
    <div id="tomorrow-input-group">
        <input type="text" id="t1" placeholder="明日計畫 1">
        <input type="text" id="t2" placeholder="明日計畫 2">
        <input type="text" id="t3" placeholder="明日計畫 3">
        <button class="main-btn" style="background:#81c784" onclick="saveTomorrowPlan()">儲存明日計畫 ✨</button>
    </div>
    <div id="tomorrow-display" style="display:none; text-align:center;">
        <p style="font-size:0.9rem; color:#4caf50; font-weight:bold;">✅ 明日計畫已就緒！</p>
        <button class="edit-btn" style="border-color:#81c784; color:#4caf50" onclick="editTomorrow()">修改明日計畫</button>
    </div>
</div>

<div class="history-section" style="width: 100%; max-width: 420px;">
    <div class="section-title">📜 我們的成長足跡</div>
    <div id="history-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD_SlAnOPvjuiq69qeDoRiqGp3_yu7nsiA",
        authDomain: "baby-progress-area.firebaseapp.com",
        databaseURL: "https://baby-progress-area-default-rtdb.firebaseio.com/", 
        projectId: "baby-progress-area",
        appId: "1:837749770988:web:d61de4c2e83494f71173c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'coupleDataV5');

    let currentUser = '小寶';
    let globalData = { active: {}, tomorrow: {}, messages: {}, history: {} };
    const userMap = { '小寶': { icon: '🐶', partner: '大寶' }, '大寶': { icon: '🐰', partner: '小寶' } };

    function getEffectiveTodayStr() {
        const now = new Date();
        now.setHours(now.getHours() - 4);
        return now.toLocaleDateString('zh-TW', {month:'short', day:'numeric'});
    }

    function getNextDayStr() {
        const now = new Date();
        now.setHours(now.getHours() - 4);
        now.setDate(now.getDate() + 1);
        return now.toLocaleDateString('zh-TW', {month:'short', day:'numeric'});
    }

    window.setRole = (role) => {
        currentUser = role;
        document.getElementById('btnA').classList.toggle('active', role === '小寶');
        document.getElementById('btnB').classList.toggle('active', role === '大寶');
        render();
    };

    onValue(dbRef, (snapshot) => {
        const d = snapshot.val() || {};
        const today = getEffectiveTodayStr();
        
        globalData.active = d.active || { '小寶': null, '大寶': null };
        globalData.tomorrow = d.tomorrow || { '小寶': null, '大寶': null };
        globalData.messages = d.messages || {};
        globalData.history = d.history || {};

        let needsUpdate = false;
        ['小寶', '大寶'].forEach(u => {
            // 跨天過期自動搬移
            if (globalData.active[u] && globalData.active[u].date !== today) {
                const expired = { ...globalData.active[u], status: 'expired', timestamp: serverTimestamp() };
                push(ref(db, 'coupleDataV5/history'), expired);
                
                if (globalData.tomorrow[u]) {
                    const imported = { ...globalData.tomorrow[u], date: today, status: 'pending' };
                    set(ref(db, `coupleDataV5/active/${u}`), imported);
                    set(ref(db, `coupleDataV5/tomorrow/${u}`), null);
                } else {
                    set(ref(db, `coupleDataV5/active/${u}`), null);
                }
                needsUpdate = true;
            }
        });
        if (!needsUpdate) render();
    });

    // --- 核心改動：儲存今日目標 (支援不滿3格) ---
    window.submitGoals = () => {
        const goals = [document.getElementById('g1').value.trim(), document.getElementById('g2').value.trim(), document.getElementById('g3').value.trim()].filter(g => g !== "");
        if (goals.length === 0) return alert("至少要寫一個目標喔！🌸");
        
        const dateStr = document.getElementById('today-date-title').innerText.match(/\d+月\d+日/)[0];

        set(ref(db, `coupleDataV5/active/${currentUser}`), {
            owner: currentUser, date: dateStr, status: 'pending',
            items: goals.map(g => ({t: g, d: false}))
        });
    };

    // --- 核心改動：修改今日目標 (回到輸入狀態) ---
    window.modifyTodayGoal = () => {
        const current = globalData.active[currentUser];
        const confirmed = confirm("要修改今天的目標嗎？修改後需要重新請寶寶蓋章喔！");
        if (confirmed) {
            // 先把資料填回輸入框的邏輯在 render 裡處理，這裡直接清空 active
            const items = current.items.map(i => i.t);
            set(ref(db, `coupleDataV5/active/${currentUser}`), null).then(() => {
                setTimeout(() => {
                    if (items[0]) document.getElementById('g1').value = items[0];
                    if (items[1]) document.getElementById('g2').value = items[1];
                    if (items[2]) document.getElementById('g3').value = items[2];
                }, 100);
            });
        }
    };

    // --- 核心改動：儲存明日計畫 (支援不滿3格) ---
    window.saveTomorrowPlan = () => {
        const goals = [document.getElementById('t1').value.trim(), document.getElementById('t2').value.trim(), document.getElementById('t3').value.trim()].filter(g => g !== "");
        if (goals.length === 0) return alert("明天也要寫至少一個目標喔！💚");
        
        set(ref(db, `coupleDataV5/tomorrow/${currentUser}`), {
            owner: currentUser, items: goals.map(g => ({t: g, d: false}))
        });
    };

    window.editTomorrow = () => {
        const prev = globalData.tomorrow[currentUser];
        const items = prev.items.map(i => i.t);
        set(ref(db, `coupleDataV5/tomorrow/${currentUser}`), null).then(() => {
            setTimeout(() => {
                if (items[0]) document.getElementById('t1').value = items[0];
                if (items[1]) document.getElementById('t2').value = items[1];
                if (items[2]) document.getElementById('t3').value = items[2];
            }, 100);
        });
    };

    window.toggleCheck = (idx) => {
        const target = globalData.active[currentUser];
        if (!target || target.status !== 'pending') return;
        target.items[idx].d = !target.items[idx].d;
        set(ref(db, `coupleDataV5/active/${currentUser}`), target);
    };

    window.requestReview = () => {
        if (!globalData.active[currentUser].items.every(i => i.d)) return alert("還沒全部打勾喔！💪");
        globalData.active[currentUser].status = 'reviewing';
        set(ref(db, `coupleDataV5/active/${currentUser}`), globalData.active[currentUser]);
    };

    window.approvePartner = () => {
        const partner = userMap[currentUser].partner;
        const stamp = document.getElementById('flower-stamp-partner');
        if(stamp) stamp.style.display = 'flex';
        
        setTimeout(() => {
            const finished = { ...globalData.active[partner], status: 'completed', timestamp: serverTimestamp() };
            push(ref(db, 'coupleDataV5/history'), finished);
            
            // 蓋章後檢查明日計畫
            const tomorrowPlan = globalData.tomorrow[partner];
            if (tomorrowPlan) {
                const nextGoal = { ...tomorrowPlan, date: getNextDayStr(), status: 'pending' };
                set(ref(db, `coupleDataV5/active/${partner}`), nextGoal);
                set(ref(db, `coupleDataV5/tomorrow/${partner}`), null);
            } else {
                set(ref(db, `coupleDataV5/active/${partner}`), null);
            }
            alert(`🌸 已幫 ${partner} 蓋章！`);
        }, 1000);
    };

    window.sendMessage = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        const now = new Date();
        push(ref(db, 'coupleDataV5/messages'), {
            sender: currentUser, text: input.value, time: now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0'), 
            date: getEffectiveTodayStr(), timestamp: serverTimestamp()
        });
        input.value = '';
    };

    window.deleteHistory = (key) => { if(confirm("確定刪除？")) remove(ref(db, `coupleDataV5/history/${key}`)); };

    function render() {
        const myActive = globalData.active[currentUser];
        const partner = userMap[currentUser].partner;
        const pActive = globalData.active[partner];

        // 我的任務區
        const myS = document.getElementById('my-section');
        if (!myActive) {
            // 如果沒目標，檢查是否有「明日計畫」未匯入的情況，這裡預設顯示下一天的標題
            const displayDate = getEffectiveTodayStr(); 
            myS.innerHTML = `
                <div class="input-group">
                    <h3 id="today-date-title">✍ 設定目標 (${displayDate})</h3>
                    <input type="text" id="g1" placeholder="目標 1"><input type="text" id="g2" placeholder="目標 2"><input type="text" id="g3" placeholder="目標 3">
                    <button class="main-btn" onclick="submitGoals()">開始我的一天 ✨</button>
                </div>`;
        } else {
            myS.innerHTML = `
                <div class="goal-card">
                    <h4>我的任務 (${myActive.date})</h4>
                    ${myActive.items.map((it, i) => `<div class="goal-item"><input type="checkbox" ${it.d ? 'checked' : ''} ${myActive.status!=='pending' ? 'disabled' : ''} onclick="toggleCheck(${i})"><span>${it.t}</span></div>`).join('')}
                    <div style="margin-top:15px; display:flex; flex-direction:column; gap:5px;">
                        ${myActive.status === 'pending' ? '<button class="main-btn" onclick="requestReview()">做完了！請寶寶蓋章</button>' : '<p class="status-msg">⏳ 等待寶寶蓋章中...</p>'}
                        <button class="edit-btn" onclick="modifyTodayGoal()">修改今日目標</button>
                    </div>
                </div>`;
        }

        // 對方進度區
        const pS = document.getElementById('partner-section');
        if (!pActive) {
            pS.innerHTML = `<p class="status-msg">🍵 ${partner} 還沒設定目標...</p>`;
        } else {
            pS.innerHTML = `<div class="goal-card" style="border-style: solid;"><div id="flower-stamp-partner" class="stamp"><i>🌸</i><span>棒棒</span></div><h4>${partner} 的進度</h4>${pActive.items.map(it => `<div class="goal-item"><input type="checkbox" ${it.d ? 'checked' : ''} disabled><span>${it.t}</span></div>`).join('')}<div style="margin-top:15px;">${pActive.status === 'reviewing' ? `<button class="main-btn" style="background:#ff6b81" onclick="approvePartner()">💮 幫 ${partner} 蓋章</button>` : `<p class="status-msg">寶寶加油中！</p>`}</div></div>`;
        }

        // 留言區
        const msgList = document.getElementById('message-list');
        const msgs = Object.values(globalData.messages || {}).sort((a,b) => a.timestamp - b.timestamp);
        msgList.innerHTML = msgs.length > 0 ? msgs.map(m => `<div class="msg-bubble ${m.sender === currentUser ? 'msg-right' : 'msg-left'}"><small style="font-size:0.6rem; opacity:0.7;">${m.time}</small><br>${m.text}</div>`).join('') : '<p style="text-align:center;color:#ccc;font-size:0.8rem;">還沒有留言...</p>';
        msgList.scrollTop = msgList.scrollHeight;

        // 明日計畫區
        const tmPlan = globalData.tomorrow[currentUser];
        document.getElementById('tomorrow-input-group').style.display = tmPlan ? 'none' : 'block';
        document.getElementById('tomorrow-display').style.display = tmPlan ? 'block' : 'none';

        // 歷史紀錄
        const hist = Object.entries(globalData.history || {}).sort(([,a], [,b]) => (b.timestamp||0) - (a.timestamp||0));
        document.getElementById('history-list').innerHTML = hist.map(([key, h]) => `<div class="history-item"><button class="del-btn" onclick="deleteHistory('${key}')">🗑️</button><small>${h.date} · ${userMap[h.owner].icon}${h.owner}</small><br>${h.items.map(i => (i.d?'✅':'❌')+i.t).join(' | ')}</div>`).join('');
    }
</script>
</body>
</html>
