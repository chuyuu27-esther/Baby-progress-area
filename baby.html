<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今天也要一起進步 🌸</title>
    <style>
        :root {
            --bg-color: #fdfcf5; --primary-pink: #ffb7c5; --deep-pink: #e08e9b;
            --accent-pink: #ffebee; --stamp-color: #ff6b81; --text-color: #5d4037;
            --shadow: 0 10px 25px rgba(224, 142, 155, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh;
        }
        h2 { color: var(--deep-pink); font-weight: 600; margin-bottom: 5px; }
        .subtitle { font-size: 0.85rem; color: #a08080; margin-bottom: 20px; }
        .container {
            width: 100%; max-width: 420px; background: white;
            padding: 25px; border-radius: 30px;
            box-shadow: var(--shadow); border: 2px solid var(--accent-pink);
        }
        .role-switcher { display: flex; gap: 10px; margin-bottom: 20px; background: var(--accent-pink); padding: 5px; border-radius: 50px; }
        .role-btn { flex: 1; border: none; padding: 10px; border-radius: 50px; cursor: pointer; color: var(--deep-pink); background: transparent; font-weight: bold; }
        .role-btn.active { background: var(--primary-pink); color: white; }
        
        .input-group h3 { text-align: center; color: var(--deep-pink); margin-top: 0; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--accent-pink); border-radius: 12px; }
        .main-btn { width: 100%; background: var(--primary-pink); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        
        .goal-card { position: relative; border: 2px solid var(--accent-pink); border-radius: 20px; padding: 15px; background: #fffafb; margin-bottom: 20px; }
        .goal-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--accent-pink); }
        input[type="checkbox"] { appearance: none; width: 22px; height: 22px; border: 2px solid var(--primary-pink); border-radius: 6px; position: relative; cursor: pointer; }
        input[type="checkbox"]:checked { background-color: var(--primary-pink); }
        input[type="checkbox"]:checked::after { content: '❤'; position: absolute; color: white; font-size: 12px; top: 2px; left: 4px; }
        
        .stamp {
            position: absolute; right: 0; top: -10px; width: 80px; height: 80px;
            border: 3px double var(--stamp-color); color: var(--stamp-color); border-radius: 50%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.9); transform: rotate(15deg); z-index: 10;
            animation: stampIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes stampIn { 0% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        
        .history-section { width: 100%; max-width: 420px; margin-top: 20px; }
        .history-item { background: white; padding: 12px; margin-bottom: 10px; border-radius: 15px; border-left: 5px solid var(--primary-pink); font-size: 0.9rem; }
        .status-msg { text-align: center; color: var(--deep-pink); padding: 10px; font-size: 0.9rem; }
        .expired-tag { color: #aaa; font-size: 0.7rem; margin-left: 5px; border: 1px solid #ddd; padding: 1px 4px; border-radius: 4px; }
    </style>
</head>
<body>

<script>
    const secret = "0926"; 
    while (prompt("請輸入我們的秘密代號 🤫") !== secret) { alert("代號不對喔，再好好想一下啊！🐶🐰"); }
</script>

<h2>今天也要一起進步 🌸</h2>
<div class="subtitle">小寶 🐶 & 大寶 🐰 的秘密基地</div>

<div class="container">
    <div class="role-switcher">
        <button id="btnA" class="role-btn active" onclick="setRole('小寶')">我是小寶 🐶</button>
        <button id="btnB" class="role-btn" onclick="setRole('大寶')">我是大寶 🐰</button>
    </div>
    
    <div id="my-section"></div>
    <hr style="border: 0; border-top: 1px solid var(--accent-pink); margin: 25px 0;">
    <div id="partner-section"></div>
</div>

<div class="history-section">
    <h3>📜 我們的成長足跡</h3>
    <div id="history-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD_SlAnOPvjuiq69qeDoRiqGp3_yu7nsiA",
        authDomain: "baby-progress-area.firebaseapp.com",
        databaseURL: "https://baby-progress-area-default-rtdb.firebaseio.com/", 
        projectId: "baby-progress-area",
        storageBucket: "baby-progress-area.firebasestorage.app",
        messagingSenderId: "837749770988",
        appId: "1:837749770988:web:d61de4c2e83494f71173c9",
        measurementId: "G-911HS8D5FS"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'coupleDataV4');

    let currentUser = '小寶';
    let globalData = { active: { '小寶': null, '大寶': null }, history: {} };
    const userMap = { '小寶': { icon: '🐶', partner: '大寶' }, '大寶': { icon: '🐰', partner: '小寶' } };

    // --- 核心改動：以凌晨 4 點為分界線的日期計算 ---
    function getEffectiveTodayStr() {
        const now = new Date();
        // 將當前時間減去 4 小時
        // 範例：若現在是 4/16 03:00，減去 4 小時後會變成 4/15 23:00
        now.setHours(now.getHours() - 4);
        return now.toLocaleDateString('zh-TW', {month:'short', day:'numeric'});
    }

    window.setRole = (role) => {
        currentUser = role;
        document.getElementById('btnA').classList.toggle('active', role === '小寶');
        document.getElementById('btnB').classList.toggle('active', role === '大寶');
        render();
    };

    onValue(dbRef, (snapshot) => {
        const d = snapshot.val();
        let rawActive = (d && d.active) ? d.active : { '小寶': null, '大寶': null };
        globalData.history = (d && d.history) ? d.history : {};
        
        let needsUpdate = false;
        const effectiveToday = getEffectiveTodayStr(); // 取得目前的「生效日期」
        
        ['小寶', '大寶'].forEach(user => {
            // 如果儲存的目標日期與現在計算出的生效日期不同，代表該過期了
            if (rawActive[user] && rawActive[user].date !== effectiveToday) {
                const expiredTask = { ...rawActive[user], status: 'expired', timestamp: serverTimestamp() };
                push(ref(db, 'coupleDataV4/history'), expiredTask);
                rawActive[user] = null;
                needsUpdate = true;
            }
        });

        globalData.active = rawActive;
        
        if (needsUpdate) {
            set(dbRef, globalData);
        } else {
            render();
        }
    });

    window.submitGoals = () => {
        const goals = [document.getElementById('g1').value, document.getElementById('g2').value, document.getElementById('g3').value];
        if(goals.some(g => !g)) return alert("要填滿三格喔！✨");
        
        globalData.active[currentUser] = {
            owner: currentUser,
            date: getEffectiveTodayStr(), // 存入當前的「生效日期」
            status: 'pending',
            items: goals.map(g => ({t: g, d: false}))
        };
        set(dbRef, globalData);
    };

    window.toggleCheck = (idx) => {
        if (!globalData.active[currentUser] || globalData.active[currentUser].status !== 'pending') return;
        globalData.active[currentUser].items[idx].d = !globalData.active[currentUser].items[idx].d;
        set(dbRef, globalData);
    };

    window.requestReview = () => {
        if (!globalData.active[currentUser].items.every(i => i.d)) return alert("還沒做完喔！💪");
        globalData.active[currentUser].status = 'reviewing';
        set(dbRef, globalData);
    };

    window.approvePartner = () => {
        const partner = userMap[currentUser].partner;
        const stamp = document.getElementById('flower-stamp-partner');
        if(stamp) stamp.style.display = 'flex';
        
        setTimeout(() => {
            const finished = { ...globalData.active[partner], status: 'completed', timestamp: serverTimestamp() };
            push(ref(db, 'coupleDataV4/history'), finished);
            globalData.active[partner] = null;
            set(dbRef, globalData);
            alert("🌸 幫對方蓋章成功！");
        }, 1000);
    };

    function render() {
        const mySection = document.getElementById('my-section');
        const partnerSection = document.getElementById('partner-section');
        const partner = userMap[currentUser].partner;

        const myActive = globalData.active[currentUser];
        if (!myActive) {
            mySection.innerHTML = `
                <div class="input-group">
                    <h3>✍ 設定我的今日目標</h3>
                    <input type="text" id="g1" placeholder="第一件事..."><input type="text" id="g2" placeholder="第二件事..."><input type="text" id="g3" placeholder="第三件事...">
                    <button class="main-btn" onclick="submitGoals()">開始我的一天 ✨</button>
                </div>`;
        } else {
            mySection.innerHTML = `
                <div class="goal-card">
                    <h4>我的任務 (${myActive.date})</h4>
                    ${myActive.items.map((it, i) => `
                        <div class="goal-item">
                            <input type="checkbox" ${it.d ? 'checked' : ''} ${myActive.status!=='pending' ? 'disabled' : ''} onclick="toggleCheck(${i})">
                            <span style="${it.d ? 'text-decoration:line-through;color:#bbb' : ''}">${it.t}</span>
                        </div>`).join('')}
                    <div style="margin-top:15px;">
                        ${myActive.status === 'pending' ? '<button class="main-btn" onclick="requestReview()">做完了！請寶寶蓋章</button>' : '<p class="status-msg">⏳ 等待對方蓋章中...</p>'}
                    </div>
                </div>`;
        }

        const pActive = globalData.active[partner];
        if (!pActive) {
            partnerSection.innerHTML = `<p class="status-msg">🍵 ${partner} ${userMap[partner].icon} 還沒設定目標...</p>`;
        } else {
            partnerSection.innerHTML = `
                <div class="goal-card" style="border-style: solid; opacity: 0.9;">
                    <div id="flower-stamp-partner" class="stamp"><i>🌸</i><span>棒棒</span></div>
                    <h4>${partner} ${userMap[partner].icon} 的進度</h4>
                    ${pActive.items.map(it => `
                        <div class="goal-item">
                            <input type="checkbox" ${it.d ? 'checked' : ''} disabled>
                            <span style="${it.d ? 'text-decoration:line-through;color:#bbb' : ''}">${it.t}</span>
                        </div>`).join('')}
                    <div style="margin-top:15px;">
                        ${pActive.status === 'reviewing' ? `<button class="main-btn" style="background:#ff6b81" onclick="approvePartner()">💮 幫 ${partner} 蓋章</button>` : `<p class="status-msg">寶寶奮鬥中</p>`}
                    </div>
                </div>`;
        }

        const hist = Object.values(globalData.history || {}).sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
        document.getElementById('history-list').innerHTML = hist.map(h => {
            const isExpired = h.status === 'expired';
            return `<div class="history-item">
                <small>${h.date} · ${userMap[h.owner].icon}${h.owner} ${isExpired ? '<span class="expired-tag">未完成</span>' : ''}</small><br>
                ${h.items.map(i => (i.d?'✅':'❌')+i.t).join(' | ')}
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
