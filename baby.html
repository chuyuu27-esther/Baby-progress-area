<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今天也要一起進步 🌸</title>
    <style>
        :root {
            --bg-color: #fdfcf5; --primary-pink: #ffb7c5; --deep-pink: #e08e9b;
            --accent-pink: #ffebee; --stamp-color: #ff6b81; --text-color: #5d4037;
            --tomorrow-bg: #f5fff5; --tomorrow-border: #e2f3e2; /* 超淺馬卡龍綠 */
            --shadow: 0 10px 25px rgba(224, 142, 155, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; margin: 0; min-height: 100vh;
        }
        h2 { color: var(--deep-pink); font-weight: 600; margin-bottom: 5px; }
        .subtitle { font-size: 0.85rem; color: #a08080; margin-bottom: 20px; }
        .container {
            width: 100%; max-width: 420px; background: white;
            padding: 25px; border-radius: 30px;
            box-shadow: var(--shadow); border: 2px solid var(--accent-pink);
        }
        .role-switcher { display: flex; gap: 10px; margin-bottom: 20px; background: var(--accent-pink); padding: 5px; border-radius: 50px; }
        .role-btn { flex: 1; border: none; padding: 10px; border-radius: 50px; cursor: pointer; color: var(--deep-pink); background: transparent; font-weight: bold; }
        .role-btn.active { background: var(--primary-pink); color: white; }
        
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--accent-pink); border-radius: 12px; font-size: 1rem; outline: none; }
        .main-btn { width: 100%; background: var(--primary-pink); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 5px; }
        .edit-btn { background: none; border: 1px solid var(--primary-pink); color: var(--primary-pink); padding: 5px 12px; border-radius: 10px; font-size: 0.8rem; cursor: pointer; margin-top: 10px; align-self: center; }

        ..wish-box { background: #fff9e6; border: 2px dashed var(--bg-color); border-radius: 15px; padding: 10px; margin: 10px 0; font-size: 0.9rem; color: #b8860b; text-align: center; }

        .goal-card { position: relative; border: 2px solid var(--accent-pink); border-radius: 20px; padding: 15px; background: #fffafb; margin-bottom: 20px; overflow: hidden; display: flex; flex-direction: column; }
        .goal-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px dashed var(--accent-pink); }
        
        input[type="checkbox"] { appearance: none; width: 22px; height: 22px; border: 2px solid var(--primary-pink); border-radius: 6px; position: relative; cursor: pointer; }
        input[type="checkbox"]:checked { background-color: var(--primary-pink); }
        input[type="checkbox"]:checked::after {
            content: '❤'; position: absolute; color: white; font-size: 14px;
            top: 50%; left: 50%; transform: translate(-50%, -50%); line-height: 1;
        }
        
        .stamp {
            position: absolute; right: 5px; top: 5px; width: 70px; height: 70px;
            border: 3px double var(--stamp-color); color: var(--stamp-color); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(255, 255, 255, 0.8); transform: rotate(15deg); z-index: 10;
            font-weight: bold; font-size: 0.8rem;
            animation: stampIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes stampIn { 0% { transform: scale(3) rotate(0deg); opacity: 0; } 100% { transform: scale(1) rotate(15deg); opacity: 1; } }
        
        .section-title { font-size: 1.1rem; color: var(--deep-pink); margin: 25px 0 10px 0; display: flex; align-items: center; gap: 8px; font-weight: bold; }
        .tomorrow-board { width: 100%; max-width: 420px; border-radius: 20px; padding: 15px; border: 2px solid var(--tomorrow-border); margin-top: 10px; background: var(--tomorrow-bg); }
        
        .message-list { max-height: 200px; overflow-y: auto; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-bubble { padding: 8px 12px; border-radius: 15px; max-width: 85%; font-size: 0.95rem; }
        .msg-left { align-self: flex-start; background: white; border: 1px solid var(--accent-pink); }
        .msg-right { align-self: flex-end; background: var(--primary-pink); color: white; }

        .history-item { background: white; padding: 12px; margin-bottom: 10px; border-radius: 15px; border-left: 5px solid var(--primary-pink); font-size: 0.85rem; position: relative; }
        .history-stamp { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--stamp-color); font-size: 1.5rem; opacity: 0.6; }

        #celebration-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95); z-index: 100;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="celebration-overlay">
    <div style="font-size: 80px;">💮</div>
    <h1 style="color: var(--stamp-color);">世界最厲害的寶寶！</h1>
    <p style="font-size: 1.2rem;">寶寶你做到了！<br>送你一個大大的ㄇㄨㄚˋ ❤</p>
    <button class="main-btn" style="width:150px; margin-top:20px;" onclick="closeCelebration()">收下獎勵！</button>
</div>

<script>
    const secret = "0926"; 
    while (prompt("秘密代號 🤫") !== secret) { alert("再好好想想呀！"); }
</script>

<h2>今天也要一起進步 🌸</h2>
<div class="subtitle">小寶 🐶 & 大寶 🐰 的秘密基地</div>

<div class="container">
    <div class="role-switcher">
        <button id="btnA" class="role-btn active" onclick="setRole('小寶')">小寶 🐶</button>
        <button id="btnB" class="role-btn" onclick="setRole('大寶')">大寶 🐰</button>
    </div>
    <div id="my-section"></div>
    <hr style="border: 0; border-top: 1px solid var(--accent-pink); margin: 25px 0;">
    <div id="partner-section"></div>
</div>

<div class="section-title">💬 暖呼呼小語</div>
<div class="container" style="padding:15px; box-shadow:none; border:1px solid var(--accent-pink);">
    <div id="message-list" class="message-list"></div>
    <div style="display:flex; gap:8px;">
        <input type="text" id="msg-input" placeholder="說點什麼...">
        <button class="role-btn active" style="width:50px; flex:none; border-radius:15px;" onclick="sendMessage()">❤</button>
    </div>
</div>

<div class="section-title">📅 預約明天的進步</div>
<div class="tomorrow-board">
    <div id="tomorrow-input-group">
        <input type="text" id="t1" placeholder="明日計畫 1">
        <input type="text" id="t2" placeholder="明日計畫 2">
        <input type="text" id="t3" placeholder="明日計畫 3">
        <button class="main-btn" style="background:#a5d6a7" onclick="saveTomorrowPlan()">儲存明日計畫 ✨</button>
    </div>
    <div id="tomorrow-display" style="display:none; text-align:center;">
        <p style="color:#4caf50; font-weight:bold;">明日計畫已備妥 🚀</p>
        <button class="edit-btn" style="border-color:#a5d6a7; color:#4caf50; margin:0;" onclick="editTomorrow()">修改明日計畫</button>
    </div>
</div>

<div class="history-section" style="width: 100%; max-width: 420px;">
    <div class="section-title">📜 成長足跡</div>
    <div id="history-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD_SlAnOPvjuiq69qeDoRiqGp3_yu7nsiA",
        authDomain: "baby-progress-area.firebaseapp.com",
        databaseURL: "https://baby-progress-area-default-rtdb.firebaseio.com/", 
        projectId: "baby-progress-area",
        appId: "1:837749770988:web:d61de4c2e83494f71173c9"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dbRef = ref(db, 'coupleDataV6');

    let currentUser = '小寶';
    let globalData = { active: {}, tomorrow: {}, messages: {}, history: {} };
    const userMap = { '小寶': { icon: '🐶', partner: '大寶' }, '大寶': { icon: '🐰', partner: '小寶' } };

    function getTodayStr() {
        const now = new Date();
        now.setHours(now.getHours() - 4);
        return now.toLocaleDateString('zh-TW', {month:'short', day:'numeric'});
    }

    window.setRole = (role) => {
        currentUser = role;
        document.getElementById('btnA').classList.toggle('active', role === '小寶');
        document.getElementById('btnB').classList.toggle('active', role === '大寶');
        render();
    };

    onValue(dbRef, (snapshot) => {
        const d = snapshot.val() || {};
        const today = getTodayStr();
        
        // 慶祝視窗邏輯
        if (d.active && d.active[currentUser] && d.active[currentUser].status === 'completed' && !sessionStorage.getItem('celebrated_'+d.active[currentUser].date)) {
            document.getElementById('celebration-overlay').style.display = 'flex';
        }

        let rawActive = d.active || { '小寶': null, '大寶': null };
        let rawTomorrow = d.tomorrow || { '小寶': null, '大寶': null };
        
        // --- 核心邏輯：凌晨 4 點的收割與自動接軌 ---
        ['小寶', '大寶'].forEach(u => {
            if (rawActive[u] && rawActive[u].date !== today) {
                // 1. 搬移到歷史紀錄 (只要是 completed 就帶章)
                const expired = { ...rawActive[u], timestamp: serverTimestamp() };
                delete expired.wish; // 願望不存入歷史
                push(ref(db, 'coupleDataV6/history'), expired);
                
                // 2. 檢查有無明日計畫並匯入
                if (rawTomorrow[u]) {
                    set(ref(db, `coupleDataV6/active/${u}`), { ...rawTomorrow[u], date: today, status: 'pending' });
                    set(ref(db, `coupleDataV6/tomorrow/${u}`), null);
                } else {
                    set(ref(db, `coupleDataV6/active/${u}`), null);
                }
            }
        });

        globalData = { active: rawActive, tomorrow: rawTomorrow, messages: d.messages || {}, history: d.history || {} };
        render();
    });

    window.closeCelebration = () => {
        document.getElementById('celebration-overlay').style.display = 'none';
        sessionStorage.setItem('celebrated_'+getTodayStr(), 'true');
    };

    window.submitGoals = () => {
        const goals = [document.getElementById('g1').value, document.getElementById('g2').value, document.getElementById('g3').value].filter(g => g.trim());
        const wish = document.getElementById('g-wish').value;
        if(goals.length === 0) return alert("至少寫一個目標嘛~");
        set(ref(db, `coupleDataV6/active/${currentUser}`), {
            owner: currentUser, date: getTodayStr(), status: 'pending',
            items: goals.map(g => ({t: g, d: false})),
            wish: wish
        });
    };

    window.modifyTodayGoal = () => {
        const current = globalData.active[currentUser];
        const items = current.items.map(i => i.t);
        const wish = current.wish || "";
        set(ref(db, `coupleDataV6/active/${currentUser}`), null).then(() => {
            setTimeout(() => {
                items.forEach((t, i) => { if(document.getElementById('g'+(i+1))) document.getElementById('g'+(i+1)).value = t; });
                document.getElementById('g-wish').value = wish;
            }, 100);
        });
        sessionStorage.removeItem('celebrated_'+getTodayStr()); // 修改後重置慶祝標記
    };

    window.saveTomorrowPlan = () => {
        const goals = [document.getElementById('t1').value, document.getElementById('t2').value, document.getElementById('t3').value].filter(g => g.trim());
        if(goals.length === 0) return alert("明天也要有目標喔！");
        set(ref(db, `coupleDataV6/tomorrow/${currentUser}`), {
            owner: currentUser, items: goals.map(g => ({t: g, d: false}))
        });
    };

    window.editTomorrow = () => {
        const tm = globalData.tomorrow[currentUser];
        set(ref(db, `coupleDataV6/tomorrow/${currentUser}`), null);
        setTimeout(() => {
            tm.items.forEach((it, idx) => { if(document.getElementById(`t${idx+1}`)) document.getElementById(`t${idx+1}`).value = it.t; });
        }, 100);
    };

    window.toggleCheck = (idx) => {
        const target = globalData.active[currentUser];
        target.items[idx].d = !target.items[idx].d;
        set(ref(db, `coupleDataV6/active/${currentUser}`), target);
    };

    window.requestReview = () => {
        if (!globalData.active[currentUser].items.every(i => i.d)) return alert("還沒全部打勾喔！💪");
        globalData.active[currentUser].status = 'reviewing';
        set(ref(db, `coupleDataV6/active/${currentUser}`), globalData.active[currentUser]);
    };

    window.approvePartner = () => {
        const partner = userMap[currentUser].partner;
        const partnerData = globalData.active[partner];
        partnerData.status = 'completed'; 
        set(ref(db, `coupleDataV6/active/${partner}`), partnerData);
    };

    window.sendMessage = () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;
        const now = new Date();
        push(ref(db, 'coupleDataV6/messages'), {
            sender: currentUser, text: input.value, time: now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0'), 
            date: getTodayStr(), timestamp: serverTimestamp()
        });
        input.value = '';
    };

    window.deleteHistory = (key) => { if(confirm("確定刪除？")) remove(ref(db, `coupleDataV6/history/${key}`)); };

    function render() {
        const myActive = globalData.active[currentUser];
        const partner = userMap[currentUser].partner;
        const pActive = globalData.active[partner];

        const myS = document.getElementById('my-section');
        if (!myActive) {
            myS.innerHTML = `
                <div class="input-group">
                    <h3 style="color:var(--deep-pink); text-align:center;">✍ 設定今日目標 (${getTodayStr()})</h3>
                    <input type="text" id="g1" placeholder="目標 1"><input type="text" id="g2" placeholder="目標 2"><input type="text" id="g3" placeholder="目標 3">
                    <input type="text" id="g-wish" placeholder="🎁 完成獎勵小許願 (例如：一個大抱抱)">
                    <button class="main-btn" onclick="submitGoals()">開始努力！ ✨</button>
                </div>`;
        } else {
            myS.innerHTML = `
                <div class="goal-card">
                    ${myActive.status === 'completed' ? '<div class="stamp">💮<span>棒棒</span></div>' : ''}
                    <h4>我的任務 (${myActive.date})</h4>
                    ${myActive.wish ? `<div class="wish-box">✨ 達成獎勵：${myActive.wish}</div>` : ''}
                    ${myActive.items.map((it, i) => `<div class="goal-item"><input type="checkbox" ${it.d ? 'checked' : ''} ${myActive.status!=='pending' ? 'disabled' : ''} onclick="toggleCheck(${i})"><span>${it.t}</span></div>`).join('')}
                    ${myActive.status === 'pending' ? '<button class="main-btn" onclick="requestReview()">完成！請寶寶蓋章</button>' : (myActive.status === 'reviewing' ? '<p class="status-msg">⏳ 等待寶寶蓋章中...</p>' : '<p class="status-msg" style="color:#4caf50; font-weight:bold;">🎉 任務已達成！</p>')}
                    <button class="edit-btn" onclick="modifyTodayGoal()">修改/增加任務</button>
                </div>`;
        }

        const pS = document.getElementById('partner-section');
        if (!pActive) {
            pS.innerHTML = `<p class="status-msg">🍵 ${partner} 寶寶還在準備中...</p>`;
        } else {
            pS.innerHTML = `
                <div class="goal-card">
                    ${pActive.status === 'completed' ? '<div class="stamp">💮<span>棒棒</span></div>' : ''}
                    <h4>${partner} 的任務</h4>
                    ${pActive.wish ? `<div class="wish-box">🎁 對方的願願：${pActive.wish}</div>` : ''}
                    ${pActive.items.map(it => `<div class="goal-item"><input type="checkbox" ${it.d ? 'checked' : ''} disabled><span>${it.t}</span></div>`).join('')}
                    ${pActive.status === 'reviewing' ? `<button class="main-btn" style="background:#ff6b81" onclick="approvePartner()">💮 幫 ${partner} 蓋章</button>` : `<p class="status-msg">加油中！</p>`}
                </div>`;
        }

        const msgList = document.getElementById('message-list');
        const msgs = Object.values(globalData.messages || {}).sort((a,b) => a.timestamp - b.timestamp);
        msgList.innerHTML = msgs.length > 0 ? msgs.map(m => `<div class="msg-bubble ${m.sender === currentUser ? 'msg-right' : 'msg-left'}"><small style="font-size:0.6rem; opacity:0.7;">${m.time}</small><br>${m.text}</div>`).join('') : '<p style="text-align:center;color:#ccc;font-size:0.8rem;">還沒有留言...</p>';
        msgList.scrollTop = msgList.scrollHeight;

        const tm = globalData.tomorrow[currentUser];
        document.getElementById('tomorrow-input-group').style.display = tm ? 'none' : 'block';
        document.getElementById('tomorrow-display').style.display = tm ? 'block' : 'none';

        const hist = Object.entries(globalData.history || {}).sort(([,a], [,b]) => (b.timestamp||0) - (a.timestamp||0));
        document.getElementById('history-list').innerHTML = hist.map(([key, h]) => `
            <div class="history-item">
                <button class="del-btn" onclick="deleteHistory('${key}')">🗑️</button>
                ${h.status === 'completed' ? '<div class="history-stamp">💮</div>' : ''}
                <small>${h.date} · ${userMap[h.owner].icon}${h.owner}</small><br>
                ${h.items.map(i => (i.d?'✅':'❌')+i.t).join(' | ')}
            </div>
        `).join('');
    }
</script>
</body>
</html>
